<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sartre" />
  <meta name="theme-color" content="#0b0b10" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <meta name="googlebot" content="noindex, nofollow, noarchive" />
  <title>Sartre</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: #0b0b10; color: #f2f2f2;
      overscroll-behavior: none;
    }
    body {
      display: flex; flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      min-height: 100%;
    }
    header {
      padding: 24px 24px 12px;
      display: flex; flex-direction: column; gap: 14px;
      align-items: center;
    }
    h1 {
      margin: 0; font-size: 30px; font-weight: 600; letter-spacing: -0.02em;
    }
    .who {
      display: flex; align-items: center; gap: 10px;
      background: #1a1a22; border-radius: 14px;
      padding: 14px 18px;
      font-size: 17px;
    }
    .who label { color: #8891a5; }
    .who select {
      background: transparent; color: #f2f2f2; border: 0;
      font-size: 20px; font-weight: 600;
      -webkit-appearance: none; appearance: none; padding-right: 22px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0 L5 6 L10 0' fill='%238891a5'/></svg>");
      background-repeat: no-repeat; background-position: right 2px center;
    }
    main {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 0 28px 160px;
      text-align: center;
    }
    .callout {
      color: #c0c4d0; font-size: 18px; line-height: 1.5;
      max-width: 360px; margin: 0 0 16px;
    }
    .callout strong { color: #f2f2f2; font-weight: 600; }
    .arrow {
      margin-top: 12px; color: #5a5e6e; font-size: 64px;
      display: inline-block;
      animation: bob 1.6s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes bob {
      0%, 100% { transform: translate(0, 0); }
      50%      { transform: translate(10px, 10px); }
    }
    .whisper {
      color: #6a6e7c; font-size: 13px; margin-top: 24px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Sartre</h1>
    <div class="who">
      <label for="who">I'm</label>
      <select id="who" autocomplete="off">
        <option value="sofia">Sofia</option>
        <option value="alex">Alex</option>
        <option value="sarah">Sarah</option>
        <option value="ben" selected>Ben</option>
        <option value="yulia">Yulia</option>
      </select>
    </div>
  </header>

  <main>
    <p class="callout">Tap the <strong>Talk to Sartre</strong> button in the corner to start a conversation.</p>
    <div class="arrow">↘︎</div>
    <p class="whisper">Tap it again when you're done.</p>
  </main>

  <elevenlabs-convai id="sartre-widget" agent-id="agent_8401kpkzcc64efrrahvrq0qtk7w8"></elevenlabs-convai>
  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>

  <script>
    const who = document.getElementById("who");
    const widget = document.getElementById("sartre-widget");

    const saved = localStorage.getItem("sartre.user");
    if (saved && [...who.options].some(o => o.value === saved)) who.value = saved;

    function applyUser(userId) {
      widget.setAttribute("dynamic-variables", JSON.stringify({ user_id: userId }));
    }
    applyUser(who.value);

    who.addEventListener("change", () => {
      localStorage.setItem("sartre.user", who.value);
      applyUser(who.value);
    });
  </script>
</body>
</html>
