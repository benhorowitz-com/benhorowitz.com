<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Sartre" />
  <meta name="theme-color" content="#111111" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <meta name="googlebot" content="noindex, nofollow, noarchive" />
  <title>Sartre</title>
  <style>
    :root { color-scheme: dark; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      background: #0b0b10; color: #f2f2f2;
      overscroll-behavior: none;
    }
    body {
      display: flex; flex-direction: column;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      min-height: 100%;
    }
    header {
      padding: 20px 24px 16px;
      display: flex; flex-direction: column; gap: 12px;
      align-items: center;
    }
    h1 {
      margin: 0; font-size: 28px; font-weight: 600; letter-spacing: -0.02em;
    }
    .who {
      display: flex; align-items: center; gap: 10px;
      background: #1a1a22; border-radius: 12px;
      padding: 10px 14px;
    }
    .who label { font-size: 14px; color: #a0a0b0; }
    .who select {
      background: transparent; color: #f2f2f2; border: 0; font-size: 18px; font-weight: 500;
      -webkit-appearance: none; appearance: none; padding-right: 20px;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0 L5 6 L10 0' fill='%23a0a0b0'/></svg>");
      background-repeat: no-repeat; background-position: right 2px center;
    }
    main {
      flex: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 0 24px 120px;
      text-align: center; color: #888; line-height: 1.6;
    }
    main p { max-width: 420px; font-size: 15px; }
    main .arrow { margin-top: 20px; color: #555; font-size: 48px; }
    /* The widget element renders as a fixed-position floating button.
       Keeping its defaults. */
  </style>
</head>
<body>
  <header>
    <h1>Sartre</h1>
    <div class="who">
      <label for="who">I'm</label>
      <select id="who" autocomplete="off">
        <option value="sofia">Sofia</option>
        <option value="alex">Alex</option>
        <option value="sarah">Sarah</option>
        <option value="ben" selected>Ben</option>
        <option value="yulia">Yulia</option>
      </select>
    </div>
  </header>

  <main>
    <p>Pick who you are above, then tap the circle in the bottom-right to start talking with Sartre.</p>
    <p>Tap again when you're done.</p>
    <div class="arrow">↘︎</div>
  </main>

  <!-- ConvAI widget: floats bottom-right by default (placement per agent's widget_config). -->
  <elevenlabs-convai id="sartre-widget" agent-id="agent_8401kpkzcc64efrrahvrq0qtk7w8"></elevenlabs-convai>

  <script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>

  <script>
    const who = document.getElementById("who");
    const widget = document.getElementById("sartre-widget");

    // Restore saved choice
    const saved = localStorage.getItem("sartre.user");
    if (saved && [...who.options].some(o => o.value === saved)) who.value = saved;

    function applyUser(userId) {
      widget.setAttribute("dynamic-variables", JSON.stringify({ user_id: userId }));
    }
    applyUser(who.value);

    who.addEventListener("change", () => {
      localStorage.setItem("sartre.user", who.value);
      applyUser(who.value);
    });
  </script>
</body>
</html>
